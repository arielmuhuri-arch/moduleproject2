<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniVerse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 onclick="loadTop()">AniVerse</h1>
    <input id="q" placeholder="Search anime...">
    <button onclick="search()">Search</button>
  </header>
  <nav class="filters">
    <button onclick="loadTop()">Top</button>
    <button onclick="loadAiring()">Airing</button>
    <button onclick="loadUpcoming()">Upcoming</button>
  </nav>
  <main id="grid" class="grid"></main>
  <div id="modal" class="modal" onclick="if(event.target===this)close()">
    <div class="modal-content" id="modal-body"></div>
  </div>
  <script src="intro.js"></script>
</body>
</html>
